<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigate B2 · Dialogue: Word Order | Meeting Planning</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #eef2f0;
            font-family: 'Inter', sans-serif;
            padding: 40px 20px;
            color: #1a2a2a;
        }

        /* main container – elegant coursebook style */
        .exercise-container {
            max-width: 900px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: all 0.2s;
        }

        /* header */
        .header {
            background: #0f2c2c;
            padding: 28px 36px;
            color: white;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            font-size: 28px;
            letter-spacing: -0.2px;
            margin-bottom: 8px;
        }

        .header h1 span {
            color: #bfa57d;
            font-style: italic;
        }

        .sub {
            font-size: 14px;
            opacity: 0.75;
            border-left: 3px solid #bfa57d;
            padding-left: 14px;
            margin-top: 8px;
        }

        /* dialogue area */
        .dialogue-box {
            padding: 32px 36px;
            background: #fefcf8;
        }

        .speech {
            margin-bottom: 28px;
            line-height: 1.55;
            font-size: 16px;
        }

        .speaker {
            font-weight: 700;
            color: #1f5e5e;
            display: inline-block;
            min-width: 70px;
            font-size: 15px;
            letter-spacing: 0.3px;
        }

        .text {
            display: inline;
            color: #1e2f2f;
        }

        /* blank spaces (interactive gaps) */
        .word-gap {
            display: inline-flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            background: #f0f3f0;
            border-radius: 60px;
            padding: 6px 16px 6px 20px;
            margin: 0 4px;
            border: 1px solid #d4dfd4;
            box-shadow: inset 0 1px 1px rgba(0,0,0,0.02), 0 1px 2px rgba(0,0,0,0.03);
        }

        .word-option {
            background: white;
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 14px;
            font-weight: 500;
            color: #1c4d4d;
            cursor: pointer;
            user-select: none;
            transition: 0.1s linear;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05), 0 0 0 1px #e2e8e2;
            font-family: 'Inter', monospace;
            letter-spacing: 0.2px;
        }

        .word-option:hover {
            background: #e6f0e6;
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .word-option:active {
            transform: scale(0.97);
        }

        .slot-container {
            display: inline-flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
            background: #eef3ee;
            border-radius: 48px;
            padding: 5px 12px 5px 16px;
            margin: 0 6px;
            border: 1px dashed #8fa88f;
            min-width: 180px;
            transition: background 0.1s;
        }

        .slot-word {
            background: #2c5a5a;
            color: white;
            border-radius: 32px;
            padding: 5px 14px;
            font-size: 14px;
            font-weight: 500;
            display: inline-block;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .slot-word:hover {
            background: #1f4646;
            transform: scale(0.97);
        }

        .reset-icon {
            font-size: 12px;
            margin-left: 8px;
            cursor: pointer;
            color: #8faa8f;
            transition: 0.1s;
        }

        .reset-icon:hover {
            color: #c03b2b;
        }

        .check-area {
            margin-top: 32px;
            display: flex;
            gap: 18px;
            align-items: center;
            flex-wrap: wrap;
            border-top: 1px solid #e2e6df;
            padding-top: 28px;
        }

        .btn {
            border: none;
            background: #1f5e5e;
            color: white;
            font-weight: 600;
            font-size: 14px;
            padding: 12px 28px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .btn-secondary {
            background: #e4e9e2;
            color: #2a4b4b;
            border: 1px solid #cbd8cb;
        }

        .btn-secondary:hover {
            background: #d1dbd1;
        }

        .btn:hover {
            background: #0f4646;
            transform: translateY(-1px);
        }

        .feedback {
            background: #f2f6ef;
            border-radius: 24px;
            padding: 14px 22px;
            font-size: 14px;
            color: #2c5a5a;
            border-left: 5px solid #bfa57d;
            margin-top: 18px;
        }

        .feedback.correct {
            background: #e0f0e0;
            border-left-color: #3b8b3b;
            color: #1c4a1c;
        }

        .feedback.wrong {
            background: #ffeae9;
            border-left-color: #c23b2b;
            color: #8b2c1f;
        }

        hr {
            margin: 18px 0;
            border: 0;
            height: 1px;
            background: #e0e6db;
        }

        .small-note {
            font-size: 12px;
            color: #6f836f;
            margin-top: 12px;
            text-align: right;
            font-style: italic;
        }

        @media (max-width: 650px) {
            .dialogue-box {
                padding: 20px;
            }
            .word-option, .slot-word {
                font-size: 12px;
                padding: 4px 10px;
            }
            .header h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
<div class="exercise-container">
    <div class="header">
        <h1>📋 diplomatic agenda · <span>word order</span></h1>
        <div class="sub">Read the dialogue. Click on any word to move it into the gap. Click on a placed word to remove it.</div>
    </div>
    <div class="dialogue-box" id="dialogueRoot">
        <!-- dynamic dialogue will be rendered here -->
    </div>
</div>

<script>
    // ---------- ORIGINAL DIALOGUE DATA ----------
    // Each gap: id (0-based), correct sequence (array of strings), initial shuffled array
    const gapsData = [
        {   // gap 1: "like / say / something / if / to" → correct: "like to say something if"
            correct: ["like", "to", "say", "something", "if"],
            displayPrompt: "I’d .................... I may."
        },
        {   // gap 2: "for / second / just / a / interrupt" → correct: "just interrupt for a second" BUT original order: "If I could just interrupt for a second" — wait, check source: "If I could 2________________________________ for / second / just / a / interrupt." correct sequence: just / for / a / second / interrupt? Actually natural: "just for a second interrupt". -> ["just", "for", "a", "second", "interrupt"]
            correct: ["just", "for", "a", "second", "interrupt"],
            displayPrompt: "If I could .................... Don’t forget that we have another meeting at 4."
        },
        {   // gap 3: "to / that / comment / like / on" → correct: "like to comment on that"
            correct: ["like", "to", "comment", "on", "that"],
            displayPrompt: "I’d ...................., actually. There’s something I’d like to add to it."
        },
        {   // gap 4: "me / interrupting / excuse / for" → correct: "excuse me for interrupting"
            correct: ["excuse", "me", "for", "interrupting"],
            displayPrompt: "...................., but that’s already there under the second item on the agenda – business relations."
        },
        {   // gap 5: "say / I / can / here / something" → correct: "can I say something here"
            correct: ["can", "I", "say", "something", "here"],
            displayPrompt: "But ....................?"
        }
    ];

    // full dialogue segments with placeholders
    const dialogueSegments = [
        { speaker: "Kostas:", text: "So, Mr Yakamoto will be with us at around 11 o’clock. He’s coming straight from the airport." },
        { speaker: "Irina:", text: "That’s the plan, but I’d ___GAP0___ I may." },
        { speaker: "Kostas:", text: "Sure, go ahead." },
        { speaker: "Irina:", text: "He’s bound to be tired after such a long flight so I think he’d appreciate it if he could go to his hotel for a rest first." },
        { speaker: "Kostas:", text: "Good point. Yes, let’s make the meeting a little later. How about half past two? And that …" },
        { speaker: "Irina:", text: "If I could ___GAP1___ Don’t forget that we have another meeting at 4. And it’s an important one too." },
        { speaker: "Kostas:", text: "Well, I don’t think the meeting with Mr Yakamoto is likely to go past our scheduled finish time. I’m sure he’s got a lot to do. Anyway, I’ve drawn up an agenda for our meeting. Have you had a look at it?" },
        { speaker: "Irina:", text: "I’d ___GAP2___, actually. There’s something I’d like to add to it. I think we should spend some time discussing plans for increased trade with Japan. It would certainly …" },
        { speaker: "Kostas:", text: "___GAP3___, but that’s already there under the second item on the agenda – business relations." },
        { speaker: "Irina:", text: "Oh, yes. Apologies, I missed that completely. But ___GAP4___" },
        { speaker: "Kostas:", text: "Yes, of course …" }
    ];

    // state for each gap: current ordered array (filled slots)
    let currentOrders = [];
    // original shuffled pools (clickable words) for each gap
    let wordPools = [];

    // helper: shuffle array
    function shuffleArray(arr) {
        const copy = [...arr];
        for (let i = copy.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
    }

    // initialize/reset all gaps
    function initGame() {
        currentOrders = [];
        wordPools = [];
        for (let i = 0; i < gapsData.length; i++) {
            // start with empty order (no word placed yet)
            currentOrders.push([]);
            // create shuffled pool from the correct words
            const correctWords = gapsData[i].correct;
            wordPools.push(shuffleArray([...correctWords]));
        }
    }

    // render the whole dialogue
    function renderDialogue() {
        const root = document.getElementById('dialogueRoot');
        if (!root) return;
        let html = '';

        for (let seg of dialogueSegments) {
            let textWithGaps = seg.text;
            // replace ___GAP0___ , ___GAP1___ etc with interactive elements
            for (let g = 0; g < gapsData.length; g++) {
                const placeholder = `___GAP${g}___`;
                if (textWithGaps.includes(placeholder)) {
                    const gapHtml = renderGap(g);
                    textWithGaps = textWithGaps.replace(placeholder, gapHtml);
                }
            }
            html += `<div class="speech"><span class="speaker">${seg.speaker}</span> <span class="text">${textWithGaps}</span></div>`;
        }

        // add check & reset buttons + feedback area
        html += `<div class="check-area">
                    <button class="btn" id="checkAnswersBtn">✔ Check answers</button>
                    <button class="btn btn-secondary" id="resetGapsBtn">⟳ Reset all gaps</button>
                 </div>
                 <div id="feedbackMessage" class="feedback"></div>
                 <div class="small-note">💡 Click a word from the pool to add it to the gap. Click any placed word (with ✕) to remove it.</div>`;
        root.innerHTML = html;

        // attach event listeners after DOM rendering (using one-click logic instead of drag & drop)
        attachClickEvents();
        document.getElementById('checkAnswersBtn')?.addEventListener('click', checkAllAnswers);
        document.getElementById('resetGapsBtn')?.addEventListener('click', () => {
            initGame();
            renderDialogue();
        });
    }

    // render a specific gap: shows current slots (ordered words) + remaining pool (clickable)
    function renderGap(gapIndex) {
        const currentSeq = currentOrders[gapIndex];
        const pool = wordPools[gapIndex];
        const isComplete = currentSeq.length === gapsData[gapIndex].correct.length;

        // slots (ordered area)
        let slotsHtml = `<span class="slot-container" data-gap="${gapIndex}">`;
        if (currentSeq.length === 0) {
            slotsHtml += `<span style="color:#8da38d; font-size:13px;">⟵ click words below</span>`;
        } else {
            currentSeq.forEach((word, idx) => {
                slotsHtml += `<span class="slot-word" data-gap="${gapIndex}" data-word="${word}" data-idx="${idx}">${word} ✕</span>`;
            });
        }
        slotsHtml += `</span>`;

        // clickable pool (only if not complete)
        let poolHtml = `<span class="word-gap" data-pool="${gapIndex}">`;
        if (!isComplete) {
            pool.forEach((word, idx) => {
                poolHtml += `<span class="word-option" data-gap="${gapIndex}" data-word="${word}" data-poolidx="${idx}">${word}</span>`;
            });
        } else {
            poolHtml += `<span style="font-size:12px; color:#7aa57a;">✓ complete</span>`;
        }
        poolHtml += `</span>`;

        return `${slotsHtml} ${poolHtml}`;
    }

    // ----- ONE-CLICK LOGIC (no drag, simple click-to-move) -----
    function attachClickEvents() {
        // 1) Click on word in pool => move it to the slots (append to current order)
        const wordOptions = document.querySelectorAll('.word-option');
        wordOptions.forEach(option => {
            option.removeEventListener('click', handleWordClick);
            option.addEventListener('click', handleWordClick);
        });

        // 2) Click on slot-word (placed word) => remove it from slots, return to pool
        const slotWords = document.querySelectorAll('.slot-word');
        slotWords.forEach(slot => {
            slot.removeEventListener('click', handleSlotWordClick);
            slot.addEventListener('click', handleSlotWordClick);
        });

        // optional visual feedback for slot containers
        const slotContainers = document.querySelectorAll('.slot-container');
        slotContainers.forEach(container => {
            container.style.transition = 'background 0.1s';
            container.addEventListener('mouseenter', () => {
                container.style.backgroundColor = '#e2f0e2';
            });
            container.addEventListener('mouseleave', () => {
                container.style.backgroundColor = '';
            });
        });
    }

    function handleWordClick(event) {
        event.stopPropagation();
        const target = event.currentTarget;
        const gapIdx = parseInt(target.dataset.gap);
        const word = target.dataset.word;
        
        if (isNaN(gapIdx) || !word) return;

        // Check if the word still exists in the pool (avoid race conditions)
        const poolArray = wordPools[gapIdx];
        if (!poolArray.includes(word)) {
            showTemporaryFeedback(`"${word}" is already used.`, false);
            return;
        }

        const currentSeq = currentOrders[gapIdx];
        const correctLen = gapsData[gapIdx].correct.length;
        
        if (currentSeq.length >= correctLen) {
            showTemporaryFeedback(`This gap already has the maximum number of words. Remove one first.`, false);
            return;
        }

        // Add word to current order (append at end - preserves order of selection)
        currentOrders[gapIdx].push(word);
        
        // Remove word from pool
        const wordIndex = poolArray.indexOf(word);
        if (wordIndex !== -1) poolArray.splice(wordIndex, 1);
        
        // Re-render to update UI
        renderDialogue();
        showTemporaryFeedback(`✓ Added "${word}". Click words in correct order to form the phrase.`, true);
    }

    function handleSlotWordClick(event) {
        event.stopPropagation();
        const target = event.currentTarget;
        const gapIdx = parseInt(target.dataset.gap);
        const word = target.dataset.word;
        
        if (isNaN(gapIdx) || !word) return;
        
        const currentSeq = currentOrders[gapIdx];
        const wordPosition = currentSeq.indexOf(word);
        if (wordPosition !== -1) {
            // Remove from sequence
            currentSeq.splice(wordPosition, 1);
            // Return word to pool
            const poolArray = wordPools[gapIdx];
            poolArray.push(word);
            // Optional: reshuffle pool slightly for better UX
            wordPools[gapIdx] = shuffleArray(poolArray);
            renderDialogue();
            showTemporaryFeedback(`⟲ Removed "${word}". You can click it again to re-add.`, true);
        }
    }

    let timeoutId = null;
    function showTemporaryFeedback(msg, isSuccess) {
        const fbDiv = document.getElementById('feedbackMessage');
        if (!fbDiv) return;
        fbDiv.textContent = msg;
        fbDiv.className = 'feedback';
        if (isSuccess) fbDiv.classList.add('correct');
        else fbDiv.classList.add('wrong');
        if (timeoutId) clearTimeout(timeoutId);
        timeoutId = setTimeout(() => {
            if (fbDiv) {
                fbDiv.className = 'feedback';
                fbDiv.textContent = '';
            }
        }, 2000);
    }

    // check all answers
    function checkAllAnswers() {
        let allCorrect = true;
        const results = [];
        for (let i = 0; i < gapsData.length; i++) {
            const userSeq = currentOrders[i];
            const correctSeq = gapsData[i].correct;
            const isCorrect = arraysEqual(userSeq, correctSeq);
            if (!isCorrect) allCorrect = false;
            results.push({ gap: i, correct: isCorrect, user: userSeq, expected: correctSeq });
        }

        if (allCorrect) {
            let perfectMsg = "✅ Perfect! All phrases are in the correct order. Excellent diplomatic language!";
            const fbDiv = document.getElementById('feedbackMessage');
            fbDiv.innerHTML = perfectMsg;
            fbDiv.className = 'feedback correct';
        } else {
            let wrongMsg = "⚠️ Some gaps have the wrong word order. ";
            for (let res of results) {
                if (!res.correct) {
                    const expectedStr = res.expected.join(' ');
                    const userStr = res.user.length ? res.user.join(' ') : '(empty)';
                    wrongMsg += `<br><strong>Gap ${res.gap+1}:</strong> your order: “${userStr}” → correct: “${expectedStr}”. `;
                }
            }
            wrongMsg += `<br>💡 Click words in the correct sequence (the natural flow of the sentence). Use ✕ to remove and reorder.`;
            const fbDiv = document.getElementById('feedbackMessage');
            fbDiv.innerHTML = wrongMsg;
            fbDiv.className = 'feedback wrong';
        }

        // scroll to feedback
        document.getElementById('feedbackMessage')?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function arraysEqual(a, b) {
        if (a.length !== b.length) return false;
        for (let i = 0; i < a.length; i++) {
            if (a[i] !== b[i]) return false;
        }
        return true;
    }

    // restart / full reset
    function resetFullGame() {
        initGame();
        renderDialogue();
        const fb = document.getElementById('feedbackMessage');
        if (fb) {
            fb.className = 'feedback';
            fb.innerHTML = '';
        }
    }

    // helper: initial load
    initGame();
    renderDialogue();
</script>
</body>
</html>
